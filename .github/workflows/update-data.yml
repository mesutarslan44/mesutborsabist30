name: BIST 30 Saatlik Veri Güncelleme

on:
  schedule:
    # Borsa saatlerinde her saat başı (TSİ 10:00 - 18:00) ve kapanış sonrası 18:30
    # UTC: 07:00, 08:00, 09:00, 10:00, 11:00, 12:00, 13:00, 14:00, 15:00
    - cron: '0 7-15 * * 1-5'
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # Manuel tetikleme

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run data generator
        working-directory: python
        run: python generate_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/data/
          git diff --staged --quiet || git commit -m "📊 Saatlik güncelleme - $(TZ='Europe/Istanbul' date +'%Y-%m-%d %H:%M TSİ')"
          git push
