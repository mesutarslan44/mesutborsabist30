name: BIST 30 Saatlik Veri Güncelleme

on:
  schedule:
    - cron: "1 7 * * 1-5"  # Hafta ici 10:01 (TSI, UTC+3)
    - cron: "30 9 * * 1-5" # Hafta ici 12:30 (TSI, UTC+3)
    - cron: "0 14 * * 1-5" # Hafta ici 17:00 (TSI, UTC+3)
    - cron: "30 16 * * 1-5" # Hafta ici 19:30 (TSI, UTC+3)
  workflow_dispatch: # Manuel tetikleme
  repository_dispatch: # API üzerinden tetikleme
    types: [update-data-event]

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run data generator
        working-directory: python
        run: python generate_data.py

      - name: Validate generated JSON schema
        working-directory: python
        run: python validate_data_schema.py

      - name: Run recommendation snapshot tests
        working-directory: python
        run: python -m unittest tests.test_recommendation_snapshot -v

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/data/
          git diff --staged --quiet || git commit -m "📊 Saatlik güncelleme - $(TZ='Europe/Istanbul' date +'%Y-%m-%d %H:%M TSİ')"
          git push
