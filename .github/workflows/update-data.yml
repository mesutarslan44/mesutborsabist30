name: BIST 30 Saatlik Veri Güncelleme

on:
  schedule:
    # Borsa saatlerinde her saat başı (TSİ 10:30, 11:30, 12:30, 13:30, 14:30, 15:30, 16:30, 17:30, 18:30)
    # UTC: 07:30, 08:30, 09:30, 10:30, 11:30, 12:30, 13:30, 14:30, 15:30
    - cron: '30 7-15 * * 1-5'
  workflow_dispatch: # Manuel tetikleme

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run data generator
        working-directory: python
        run: python generate_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/data/
          git diff --staged --quiet || git commit -m "📊 Saatlik güncelleme - $(TZ='Europe/Istanbul' date +'%Y-%m-%d %H:%M TSİ')"
          git push
